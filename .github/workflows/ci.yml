name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# dorny/paths-filter PR'da değişen dosyaları GitHub API ile okur → pull-requests: read gerekir.
permissions:
  contents: read
  pull-requests: read

jobs:
  ts:
    name: TS workspace (turbo)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nocta
          POSTGRES_PASSWORD: nocta_local_dev
          POSTGRES_DB: nocta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nocta -d nocta"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # integration testleri (Prisma) gerçek Postgres'e karşı koşar
      DATABASE_URL: postgres://nocta:nocta_local_dev@localhost:5432/nocta?sslmode=disable
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      # SQL-first migration'ları uygula (dbmate docker image; host'a kurulum yok)
      - name: DB migrate
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/db:/db" \
            -e DATABASE_URL="$DATABASE_URL" \
            ghcr.io/amacneil/dbmate --wait up
      # Turbo cache path-filtering sağlar: değişmeyen paketler cache-hit (anında).
      - name: Lint / typecheck / test / build
        run: pnpm turbo run lint typecheck test build size

      - name: Health claim scan (CLAUDE.md §1.1)
        run: pnpm check:health-claims

      # Node tabanlı olduğu için mobile job'ında değil burada: health-claims de
      # aynı şekilde apps/mobile/lib'i buradan tarıyor.
      - name: Hard-coded string scan (CLAUDE.md §4)
        run: pnpm check:i18n

      # .env.example bir kez bayatladı (23 değişkenin 11'i eksikti). İnsan
      # disiplinine bırakılan kural, kural değil temennidir.
      - name: .env.example drift scan (CLAUDE.md §6)
        run: pnpm check:env-example

  mobile:
    name: Flutter (apps/mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile:
              - 'apps/mobile/**'
              - 'packages/design-tokens/**'
              - '.github/workflows/ci.yml'
      - if: steps.filter.outputs.mobile == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - if: steps.filter.outputs.mobile == 'true'
        name: Pub get
        working-directory: apps/mobile
        run: flutter pub get
      - if: steps.filter.outputs.mobile == 'true'
        name: Analyze
        working-directory: apps/mobile
        run: flutter analyze
      - if: steps.filter.outputs.mobile == 'true'
        name: Test
        working-directory: apps/mobile
        run: flutter test
