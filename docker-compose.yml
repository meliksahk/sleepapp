# NOCTA — LOKAL geliştirme stack'i (yalnızca localhost'a bağlanır).
# Prod/staging stack'i VPS'te AYRI compose ile kurulur ve portları dışarı AÇMAZ
# (yalnızca Docker iç ağı — docs/02 §5, docs/09 Adım 2). Bu dosya sadece lokaldir.
name: nocta-local

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nocta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nocta_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nocta}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nocta} -d ${POSTGRES_DB:-nocta}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nocta}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nocta_local_dev}
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  miniodata:
